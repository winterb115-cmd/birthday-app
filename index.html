          <div style={{fontSize:14,color:'#666',marginTop:6}}><IconCake size={14} style={{marginRight:4}}/>{c.birthday.month}월 {c.birthday.day}일</div>
        </div>
        <div>{isBirthdayToday?<div style={{fontSize:13,fontWeight:700,color:'#ff4081',background:'linear-gradient(135deg,#ff408122,#ff6b3522)',padding:'6px 14px',borderRadius:20}}>🎂 오늘 생일!</div>:<div style={{fontSize:13,color:'#999'}}>D-{daysLeft}</div>}</div>
      </div>
    </div>
  );
}

function Dashboard(){
  const monthChars=useMemo(()=>CHARACTERS.filter(c=>c.birthday.month===currentMonth).sort((a,b)=>a.birthday.day-b.birthday.day),[]);
  const todayChars=monthChars.filter(c=>c.birthday.day===currentDay);
  const otherChars=monthChars.filter(c=>c.birthday.day!==currentDay);
  return(
    <div style={{padding:20,maxWidth:600,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
        <IconSparkles size={28} color="#ff4081"/><h1 style={{margin:0,fontSize:24,fontWeight:800,color:'#333'}}>{currentMonth}월의 주인공</h1><IconSparkles size={28} color="#ff4081"/>
      </div>
      {todayChars.length>0&&<div style={{marginBottom:20}}><div style={{fontSize:13,fontWeight:700,color:'#ff4081',marginBottom:10,letterSpacing:1}}>✨ TODAY'S BIRTHDAY ✨</div>{todayChars.map(c=><BirthdayCard key={c.id} char={c} isBirthdayToday={true}/>)}</div>}
      {otherChars.length>0&&<div><div style={{fontSize:13,fontWeight:600,color:'#888',marginBottom:10}}>이번 달 생일</div>{otherChars.map(c=><BirthdayCard key={c.id} char={c} isBirthdayToday={false}/>)}</div>}
      {monthChars.length===0&&<div className="glass-strong" style={{borderRadius:16,padding:40,textAlign:'center',color:'#999'}}><IconCake size={48} color="#ccc" style={{margin:'0 auto 12px'}}/><div style={{fontSize:16}}>이번 달에는 생일인 캐릭터가 없습니다</div></div>}
    </div>
  );
}

const ALARM_TIME_KEY='birthday_alarm_time';
function loadAlarmTime(){try{const r=localStorage.getItem(ALARM_TIME_KEY);if(r){const p=JSON.parse(r);if(typeof p.hour==='number'&&typeof p.minute==='number')return p}return{hour:9,minute:0}}catch(e){return{hour:9,minute:0}}}
function saveAlarmTime(t){try{localStorage.setItem(ALARM_TIME_KEY,JSON.stringify(t))}catch(e){}}
const pad2=n=>String(n).padStart(2,'0');

function Sidebar({selectedUnit,onSelectUnit,alarmTime,onSelectAlarmTime}){
  const[exp,setExp]=useState(()=>new Set(AGENCIES.map(a=>a.id)));
  const toggle=id=>{setExp(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n})};
  const isAlarmSelected=selectedUnit==='__ALARM_TIME__';
  return(
    <div className="glass-strong" style={{width:240,minWidth:240,borderRadius:16,padding:12,overflowY:'auto',maxHeight:'calc(100vh - 140px)',display:'flex',flexDirection:'column'}}>
      <div style={{fontSize:13,fontWeight:700,color:'#888',marginBottom:12,padding:'0 8px'}}>소속사 / 유닛</div>
      <div style={{flex:1}}>
      {AGENCIES.map(a=>{const isE=exp.has(a.id);const us=UNITS.filter(u=>u.agencyId===a.id);return(
        <div key={a.id} style={{marginBottom:4}}>
          <button onClick={()=>toggle(a.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:6,padding:'8px 10px',border:'none',borderRadius:10,cursor:'pointer',background:'transparent',fontSize:13,fontWeight:700,color:'#555'}}>
            {isE?<IconChevronDown size={14}/>:<IconChevronRight size={14}/>}{a.name}
          </button>
          {isE&&us.map(u=>{const sel=selectedUnit===u.id;const col=getUnitColor(u.id);return(
            <button key={u.id} onClick={()=>onSelectUnit(u.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'7px 10px 7px 28px',border:'none',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:sel?700:500,color:sel?col:'#666',background:sel?col+'15':'transparent'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:col,boxShadow:sel?'0 0 8px '+col+'88':'none'}}/>{u.name}
            </button>
          )})}
        </div>
      )})}
      </div>
      {/* 알림시간설정 */}
      <div style={{borderTop:'1px solid rgba(0,0,0,.08)',marginTop:8,paddingTop:12}}>
        <button onClick={onSelectAlarmTime} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',border:'none',borderRadius:10,cursor:'pointer',background:isAlarmSelected?'rgba(255,64,129,.12)':'rgba(0,0,0,.03)',transition:'background .15s'}}>
          <span style={{fontSize:13,fontWeight:isAlarmSelected?700:600,color:isAlarmSelected?'#ff4081':'#555'}}>⏰ 알림시간설정</span>
          <span style={{fontSize:14,fontWeight:700,color:isAlarmSelected?'#ff4081':'#999'}}>{pad2(alarmTime.hour)}:{pad2(alarmTime.minute)}</span>
        </button>
      </div>
    </div>
  );
}

function AlarmTimePanel({alarmTime,onAlarmTimeChange}){
  const[h,setH]=useState(alarmTime.hour);
  const[m,setM]=useState(alarmTime.minute);
  const[saved,setSaved]=useState(false);
  const handleSave=()=>{onAlarmTimeChange(h,m);setSaved(true);setTimeout(()=>setSaved(false),1500)};
  return(
    <div style={{flex:1,minWidth:0}}>
      <div className="glass-strong" style={{borderRadius:16,padding:24,borderLeft:'4px solid #ff4081'}}>
        <div style={{fontSize:17,fontWeight:800,color:'#333',marginBottom:4}}>⏰ 알림시간설정</div>
        <div style={{fontSize:12,color:'#999',marginBottom:20}}>모든 알림은 설정된 시간에 발송됩니다</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,marginBottom:24}}>
          <select value={h} onChange={e=>setH(Number(e.target.value))} style={{fontSize:28,fontWeight:800,padding:'12px 16px',borderRadius:12,border:'2px solid #eee',textAlign:'center',width:100,cursor:'pointer',color:'#333'}}>
            {Array.from({length:24},(_,i)=>i).map(v=><option key={v} value={v}>{pad2(v)}</option>)}
          </select>
          <span style={{fontSize:32,fontWeight:900,color:'#333'}}>:</span>
          <select value={m} onChange={e=>setM(Number(e.target.value))} style={{fontSize:28,fontWeight:800,padding:'12px 16px',borderRadius:12,border:'2px solid #eee',textAlign:'center',width:100,cursor:'pointer',color:'#333'}}>
            {Array.from({length:60},(_,i)=>i).map(v=><option key={v} value={v}>{pad2(v)}</option>)}
          </select>
        </div>
        <button onClick={handleSave} style={{width:'100%',padding:'12px',border:'none',borderRadius:12,cursor:'pointer',fontSize:15,fontWeight:700,background:saved?'#4CAF50':'#ff4081',color:'#fff',transition:'background .3s',boxShadow:saved?'0 0 15px #4CAF5088':'0 0 15px #ff408188'}}>
          {saved?'✓ 저장 완료':'저장'}
        </button>
      </div>
      <div className="glass-strong" style={{borderRadius:16,padding:16,marginTop:12}}>
        <div style={{fontSize:13,color:'#888'}}>
          <div style={{marginBottom:6}}>· 개별 생일 알림 (7일전, 3일전, 1일전, 당일)</div>
          <div style={{marginBottom:6}}>· 매월 1일 월간 요약 알림</div>
          <div>위 모든 알림이 설정된 시간에 발송됩니다.</div>
        </div>
      </div>
    </div>
  );
}

function MobileUnitSelector({selectedUnit,onSelectUnit,alarmTime,onSelectAlarmTime}){
  const isAlarm=selectedUnit==='__ALARM_TIME__';
  const allUnits=AGENCIES.flatMap(a=>UNITS.filter(u=>u.agencyId===a.id).map(u=>({...u,agencyName:a.name})));
  return(
    <div className="glass-strong" style={{borderRadius:12,padding:10,marginBottom:12}}>
      <select value={selectedUnit} onChange={e=>{const v=e.target.value;if(v==='__ALARM_TIME__')onSelectAlarmTime();else onSelectUnit(v)}} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'2px solid #eee',fontSize:14,fontWeight:600,color:'#333',background:'#fff',cursor:'pointer'}}>
        {allUnits.map(u=><option key={u.id} value={u.id}>{u.agencyName} › {u.name}</option>)}
        <option value="__ALARM_TIME__">⏰ 알림시간설정 ({pad2(alarmTime.hour)}:{pad2(alarmTime.minute)})</option>
      </select>
    </div>
  );
}

function SettingsPanel({settings,selectedUnit,onCharToggle,onUnitToggle,alarmTime,onAlarmTimeChange}){
  if(selectedUnit==='__ALARM_TIME__')return <AlarmTimePanel alarmTime={alarmTime} onAlarmTimeChange={onAlarmTimeChange}/>;
  const unit=getUnit(selectedUnit);
  if(!unit)return(<div className="glass-strong" style={{flex:1,borderRadius:16,padding:40,display:'flex',alignItems:'center',justifyContent:'center',color:'#999'}}><div style={{textAlign:'center'}}><IconSettings size={48} color="#ccc" style={{margin:'0 auto 12px'}}/><div>유닛을 선택하세요</div></div></div>);
  const color=getUnitColor(unit.id),chars=getCharsByUnit(unit.id);
  return(
    <div style={{flex:1,minWidth:0}}>
      <div className="glass-strong" style={{borderRadius:16,padding:isMobile?12:16,marginBottom:12,borderLeft:'4px solid '+color}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
          <div style={{minWidth:0}}><div style={{fontSize:isMobile?15:17,fontWeight:800,color:'#333'}}>{unit.name}</div><div style={{fontSize:11,color:'#999',marginTop:2}}>마스터 컨트롤 · {chars.length}명</div></div>
          <UnitMasterRow settings={settings} unitId={unit.id} onUnitToggle={onUnitToggle} small={isMobile}/>
        </div>
      </div>
      <div className="glass-strong" style={{borderRadius:16,overflow:'hidden'}}>
        {chars.map((c,i)=>(
          <div key={c.id} className="fade-in" style={{position:'relative',overflow:'hidden',padding:isMobile?'10px 12px':'14px 16px',borderBottom:i<chars.length-1?'1px solid rgba(0,0,0,.05)':'none'}}>
            <div style={{position:'absolute',right:isMobile?80:160,top:-8,fontSize:isMobile?60:80,fontWeight:900,color:color,opacity:.035,lineHeight:1,pointerEvents:'none',userSelect:'none'}}>{c.name.charAt(0)}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',position:'relative',zIndex:1,gap:8}}>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:isMobile?13:15,fontWeight:600,color:'#333',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
                <div style={{fontSize:11,color:'#999',marginTop:1}}>{c.birthday.month}월 {c.birthday.day}일</div>
              </div>
              <StageRow settings={settings} charId={c.id} unitId={c.unitId} onToggle={onCharToggle} small={isMobile}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SettingsPage(){
  const[settings,setSettings]=useState(loadFromStorage);
  const[selectedUnit,setSelectedUnit]=useState('UN001');
  const[alarmTime,setAlarmTime]=useState(loadAlarmTime);
  const handleCharToggle=useCallback((cid,stage)=>{setSettings(p=>{const n={...p,[cid]:{...p[cid],[stage]:!(p[cid]&&p[cid][stage])}};saveToStorage(n);return n})},[]);
  const handleUnitToggle=useCallback((uid,stage)=>{setSettings(p=>{const allOn=computeUnitState(p,uid,stage);const v=!allOn;const n={...p};getCharsByUnit(uid).forEach(c=>{n[c.id]={...n[c.id],[stage]:v}});saveToStorage(n);return n})},[]);
  const handleAlarmTimeChange=useCallback((h,m)=>{const t={hour:h,minute:m};setAlarmTime(t);saveAlarmTime(t)},[]);
  return(
    <div style={{padding:isMobile?12:20,maxWidth:900,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:isMobile?12:20}}><IconBell size={isMobile?20:24} color="#333"/><h1 style={{margin:0,fontSize:isMobile?18:22,fontWeight:800,color:'#333'}}>알림 설정</h1></div>
      {isMobile ? (
        <div>
          <MobileUnitSelector selectedUnit={selectedUnit} onSelectUnit={setSelectedUnit} alarmTime={alarmTime} onSelectAlarmTime={()=>setSelectedUnit('__ALARM_TIME__')}/>
          <SettingsPanel settings={settings} selectedUnit={selectedUnit} onCharToggle={handleCharToggle} onUnitToggle={handleUnitToggle} alarmTime={alarmTime} onAlarmTimeChange={handleAlarmTimeChange}/>
        </div>
      ) : (
        <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
          <Sidebar selectedUnit={selectedUnit} onSelectUnit={setSelectedUnit} alarmTime={alarmTime} onSelectAlarmTime={()=>setSelectedUnit('__ALARM_TIME__')}/>
          <SettingsPanel settings={settings} selectedUnit={selectedUnit} onCharToggle={handleCharToggle} onUnitToggle={handleUnitToggle} alarmTime={alarmTime} onAlarmTimeChange={handleAlarmTimeChange}/>
        </div>
      )}
    </div>
  );
}

function NavBar({page,onNavigate}){
  return(
    <nav className="glass" style={{position:'sticky',top:0,zIndex:100,display:'flex',justifyContent:'center',gap:4,padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,.2)'}}>
      {[{id:'dashboard',label:'대시보드',Ic:IconHome},{id:'settings',label:'설정',Ic:IconSettings}].map(({id,label,Ic})=>{const a=page===id;return(
        <button key={id} onClick={()=>onNavigate(id)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 20px',border:'none',borderRadius:12,cursor:'pointer',fontSize:14,fontWeight:a?700:500,color:a?'#ff4081':'#666',background:a?'rgba(255,64,129,.1)':'transparent',transition:'all .2s'}}>
          <Ic size={18}/>{label}
        </button>
      )})}
    </nav>
  );
}

function App(){
  const[page,setPage]=useState('dashboard');
  return(<div className="stage-bg"><NavBar page={page} onNavigate={setPage}/>{page==='dashboard'?<Dashboard/>:<SettingsPage/>}</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

// Register Service Worker for PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
